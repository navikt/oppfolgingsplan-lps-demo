name: Copilot Config Auto-merge
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
jobs:
  automerge:
    if: github.head_ref == 'copilot-config-sync'
    uses: navikt/copilot-kitchen/.github/workflows/copilot-automerge.yml@main
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}
    permissions:
      contents: write
      pull-requests: write
