name: Copilot Config Sync
on:
  schedule:
    - cron: '0 5 * * *'  # Nightly at 05:00 UTC
  workflow_dispatch:
jobs:
  sync:
    uses: navikt/copilot-kitchen/.github/workflows/copilot-sync.yml@main
    with:
      collections: "common,frontend"
    permissions:
      contents: write
      pull-requests: write
