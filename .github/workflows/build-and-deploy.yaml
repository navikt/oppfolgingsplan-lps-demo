name: "Build and deploy"

on:
  push:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: "read"
      id-token: "write"
      packages: "write"

    steps:
      - uses: navikt/teamesyfo-github-actions-workflows/actions/setup-pnpm@main
        with:
          NPM_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
          node-version: 24.x
      - name: Build application
        run: pnpm run build
      - name: cache workspace
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ github.workspace }}
          key: ${{ github.sha }}

      - name: Build and push docker image
        if: ${{ github.actor != 'dependabot[bot]' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_name == 'main')) }}
        uses: nais/docker-build-push@f8bc7437f7549c2b08197152d781b98f8727a08a
        id: docker-build-push
        with:
          team: team-esyfo
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}

  merge-gate:
    name: Merge gate
    needs: build
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          set -euo pipefail

          results=(
            "build=${{ needs.build.result }}"
          )
          printf '%s\n' "${results[@]}"

          for r in "${results[@]}"; do
            status="${r#*=}"
            case "$status" in
              success|skipped) ;;
              cancelled)
                echo "::error::Required job was cancelled: $r"
                exit 1
                ;;
              *)
                echo "::error::Required job failed: $r"
                exit 1
                ;;
            esac
          done

  deploy-demo:
    name: Deploy to demo dev-gcp
    if: ${{ github.actor != 'dependabot[bot]' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_name == 'main')) }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b
        env:
          CLUSTER: dev-gcp
          RESOURCE: nais-demo.yaml
          VAR: image=${{ needs.build.outputs.image }}
