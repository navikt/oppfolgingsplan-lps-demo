name: "Build and deploy"

on:
  push:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

jobs:
  verify-hovmester-sync-merge-group:
    name: verify-hovmester-sync
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Report hovmester sync as not applicable
        shell: bash
        run: echo "verify-hovmester-sync is not applicable for merge queue; reporting success on merge_group."

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: "read"
      id-token: "write"
      packages: "write"

    steps:
      - uses: navikt/teamesyfo-github-actions-workflows/actions/setup-pnpm@main
        with:
          NPM_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
          node-version: 24.x
      - name: Build application
        run: pnpm run build
      - name: cache workspace
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ${{ github.workspace }}
          key: ${{ github.sha }}

      - name: Build and push docker image
        if: ${{ github.actor != 'dependabot[bot]' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_name == 'main')) }}
        uses: nais/docker-build-push@be85229e81c0293c265c646c084f05317fb6e0d2
        id: docker-build-push
        with:
          team: team-esyfo
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}

  merge-gate:
    name: Merge gate
    needs: build
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          set -euo pipefail

          results=(
            "build=${{ needs.build.result }}"
          )
          printf '%s\n' "${results[@]}"

          for r in "${results[@]}"; do
            status="${r#*=}"
            case "$status" in
              success|skipped) ;;
              cancelled)
                echo "::error::Required job was cancelled: $r"
                exit 1
                ;;
              *)
                echo "::error::Required job failed: $r"
                exit 1
                ;;
            esac
          done

  deploy-demo:
    name: Deploy to demo dev-gcp
    if: ${{ github.actor != 'dependabot[bot]' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_name == 'main')) }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: nais/deploy/actions/deploy@2f28259ff29ea37915f5a0c9e2a8e3542c429df7
        env:
          CLUSTER: dev-gcp
          RESOURCE: nais-demo.yaml
          VAR: image=${{ needs.build.outputs.image }}
